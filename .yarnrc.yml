nodeLinker: node-modules

enableGlobalCache: true

logFilters:
    - code: YN0002
      level: discard
    - code: YN0060
      level: discard
    - code: YN0006
      level: discard
    - code: YN0076
      level: discard

packageExtensions:
    react-responsive-embed@*:
        peerDependencies:
            prop-types: "*"
    style-loader@*:
        peerDependencies:
            webpack: "*"
