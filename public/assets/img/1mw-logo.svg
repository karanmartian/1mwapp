<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Spiritual energy gradient -->
    <linearGradient id="spiritualGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Tech flow gradient -->
    <linearGradient id="techFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4040FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Mars accent -->
    <linearGradient id="marsAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6347;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient for center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="30%" style="stop-color:#FFD700;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#FF6B00;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:0.1" />
    </radialGradient>
    
    <!-- Energy glow filter -->
    <filter id="energyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner light filter -->
    <filter id="innerLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Digital pattern -->
    <pattern id="digitalPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none"/>
      <path d="M4,4 L12,4 M8,4 L8,12 M4,12 L12,12" stroke="url(#techFlow)" stroke-width="0.5" opacity="0.3"/>
      <circle cx="4" cy="4" r="0.5" fill="url(#techFlow)" opacity="0.4"/>
      <circle cx="12" cy="12" r="0.5" fill="url(#techFlow)" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Deep space background -->
  <circle cx="60" cy="60" r="58" fill="rgba(10, 10, 30, 0.95)" stroke="url(#spiritualGradient)" stroke-width="1"/>
  
  <!-- Subtle digital pattern overlay -->
  <circle cx="60" cy="60" r="56" fill="url(#digitalPattern)" opacity="0.4"/>
  
  <!-- Central energy core -->
  <circle cx="60" cy="60" r="25" fill="url(#centerGlow)" opacity="0.3"/>
  
  <!-- Main Japanese character 八 (hachi) - expanded and stylized -->
  <g transform="translate(60, 60)">
    <!-- Left stroke of 八 -->
    <path d="M-15 -20 L-25 25 L-20 25 L-12 -15 Z" 
          fill="url(#spiritualGradient)" 
          filter="url(#energyGlow)" 
          opacity="0.9">
      <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right stroke of 八 -->
    <path d="M15 -20 L25 25 L20 25 L12 -15 Z" 
          fill="url(#spiritualGradient)" 
          filter="url(#energyGlow)" 
          opacity="0.9">
      <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="4s" repeatCount="indefinite" begin="2s"/>
    </path>
    
    <!-- Blue spaceship connecting the stems -->
    <ellipse cx="0" cy="-22" rx="12" ry="4" fill="url(#techFlow)" filter="url(#innerLight)" opacity="0.9">
      <animate attributeName="rx" values="12;14;12" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Spaceship details -->
    <ellipse cx="0" cy="-22" rx="8" ry="2" fill="url(#centerGlow)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Small navigation lights on spaceship -->
    <circle cx="-8" cy="-22" r="1" fill="url(#marsAccent)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="-22" r="1" fill="url(#marsAccent)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Spiritual energy particles -->
  <circle cx="25" cy="30" r="1.5" fill="url(#spiritualGradient)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,1;0,0" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="95" cy="85" r="1" fill="url(#techFlow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-1,2;0,0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="85" cy="25" r="1.2" fill="url(#marsAccent)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;1,-1;0,0" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Flowing energy streams -->
  <g opacity="0.5">
    <path d="M15 20 Q30 15 45 25 Q55 35 70 30" stroke="url(#spiritualGradient)" stroke-width="1.5" fill="none">
      <animate attributeName="stroke-dasharray" values="0,100;50,50;100,0" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M105 100 Q90 95 75 105 Q65 95 50 100" stroke="url(#techFlow)" stroke-width="1" fill="none">
      <animate attributeName="stroke-dasharray" values="100,0;50,50;0,100" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Subtle outer rim -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="url(#spiritualGradient)" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Corner spiritual accents (like traditional Japanese design) -->
  <g opacity="0.6">
    <circle cx="20" cy="20" r="2" fill="url(#spiritualGradient)">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="20" r="2" fill="url(#techFlow)">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="100" r="2" fill="url(#marsAccent)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="2" fill="url(#spiritualGradient)">
      <animate attributeName="opacity" values="1;0.3;1" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg> 