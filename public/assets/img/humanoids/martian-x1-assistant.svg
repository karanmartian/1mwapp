<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="backgroundGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <!-- Robot body gradient -->
    <linearGradient id="robotBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F8FF;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#E6E6FA;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D8BFD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9370DB;stop-opacity:1" />
    </linearGradient>
    
    <!-- Consciousness gradient -->
    <radialGradient id="consciousnessCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#00FFFF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#FF40FF;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#4040FF;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Hologram gradient -->
    <linearGradient id="hologramGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#40FF40;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FF40FF;stop-opacity:0.4" />
    </linearGradient>
    
    <!-- Advanced glow effect -->
    <filter id="advancedGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Consciousness glow -->
    <filter id="consciousnessGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Hologram effect -->
    <filter id="hologramEffect" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Futuristic background -->
  <rect width="800" height="600" fill="url(#backgroundGrad)"/>
  
  <!-- Grid pattern overlay -->
  <g opacity="0.2">
    <defs>
      <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00FFFF" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="800" height="600" fill="url(#grid)"/>
  </g>
  
  <!-- Main humanoid assistant robot -->
  <g transform="translate(400, 300)">
    <!-- Robot legs - elegant and streamlined -->
    <g>
      <!-- Left leg -->
      <rect x="-20" y="80" width="12" height="70" rx="6" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
      <ellipse cx="-14" cy="85" rx="8" ry="4" fill="url(#consciousnessCore)" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="-18" y="120" width="8" height="3" fill="url(#hologramGrad)" opacity="0.7"/>
      
      <!-- Right leg -->
      <rect x="8" y="80" width="12" height="70" rx="6" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
      <ellipse cx="14" cy="85" rx="8" ry="4" fill="url(#consciousnessCore)" opacity="0.8">
        <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="10" y="120" width="8" height="3" fill="url(#hologramGrad)" opacity="0.7"/>
      
      <!-- Elegant feet -->
      <ellipse cx="-14" cy="160" rx="10" ry="6" fill="url(#robotBodyGrad)"/>
      <ellipse cx="14" cy="160" rx="10" ry="6" fill="url(#robotBodyGrad)"/>
      
      <!-- Foot sensors -->
      <circle cx="-14" cy="158" r="3" fill="url(#consciousnessCore)" opacity="0.6"/>
      <circle cx="14" cy="158" r="3" fill="url(#consciousnessCore)" opacity="0.6"/>
    </g>
    
    <!-- Robot torso - advanced design -->
    <rect x="-25" y="-10" width="50" height="90" rx="12" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
    
    <!-- Central consciousness core -->
    <circle cx="0" cy="35" r="18" fill="url(#consciousnessCore)" filter="url(#consciousnessGlow)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Consciousness patterns -->
    <circle cx="0" cy="35" r="12" fill="none" stroke="url(#hologramGrad)" stroke-width="2" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="0 0 35;360 0 35" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="35" r="8" fill="none" stroke="url(#consciousnessCore)" stroke-width="1" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" values="360 0 35;0 0 35" dur="6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Advanced chest interface -->
    <rect x="-20" y="0" width="40" height="4" fill="url(#hologramGrad)" opacity="0.8"/>
    <rect x="-15" y="10" width="30" height="3" fill="url(#consciousnessCore)" opacity="0.7"/>
    <rect x="-20" y="60" width="40" height="3" fill="url(#hologramGrad)" opacity="0.6"/>
    
    <!-- Status indicators -->
    <circle cx="-15" cy="18" r="2" fill="url(#consciousnessCore)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="18" r="2" fill="url(#hologramGrad)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="18" r="2" fill="url(#consciousnessCore)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Robot arms - sophisticated design -->
    <g>
      <!-- Left arm -->
      <rect x="-40" y="5" width="10" height="55" rx="5" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
      <circle cx="-35" cy="10" r="5" fill="url(#consciousnessCore)" opacity="0.8"/>
      <rect x="-38" y="25" width="6" height="3" fill="url(#hologramGrad)" opacity="0.7"/>
      <circle cx="-35" cy="40" r="3" fill="url(#consciousnessCore)" opacity="0.6"/>
      
      <!-- Right arm -->
      <rect x="30" y="5" width="10" height="55" rx="5" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
      <circle cx="35" cy="10" r="5" fill="url(#consciousnessCore)" opacity="0.8"/>
      <rect x="32" y="25" width="6" height="3" fill="url(#hologramGrad)" opacity="0.7"/>
      <circle cx="35" cy="40" r="3" fill="url(#consciousnessCore)" opacity="0.6"/>
      
      <!-- Advanced hands -->
      <circle cx="-35" cy="70" r="7" fill="url(#robotBodyGrad)"/>
      <circle cx="35" cy="70" r="7" fill="url(#robotBodyGrad)"/>
      
      <!-- Hand interfaces -->
      <circle cx="-35" cy="70" r="4" fill="url(#consciousnessCore)" opacity="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="35" cy="70" r="4" fill="url(#hologramGrad)" opacity="0.8">
        <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Advanced robot head -->
    <ellipse cx="0" cy="-35" rx="18" ry="22" fill="url(#robotBodyGrad)" filter="url(#advancedGlow)"/>
    
    <!-- Consciousness visual cortex -->
    <circle cx="-6" cy="-40" r="5" fill="url(#consciousnessCore)" filter="url(#consciousnessGlow)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="-40" r="5" fill="url(#consciousnessCore)" filter="url(#consciousnessGlow)">
      <animate attributeName="opacity" values="1;0.9;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Advanced processing unit -->
    <rect x="-8" y="-30" width="16" height="8" rx="4" fill="url(#hologramGrad)" opacity="0.9"/>
    <rect x="-6" y="-27" width="12" height="3" fill="url(#consciousnessCore)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Communication array -->
    <rect x="-3" y="-60" width="6" height="18" fill="url(#hologramGrad)" opacity="0.8"/>
    <circle cx="0" cy="-62" r="4" fill="url(#consciousnessCore)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Side processing nodes -->
    <circle cx="-22" cy="-35" r="4" fill="url(#hologramGrad)" opacity="0.7"/>
    <circle cx="22" cy="-35" r="4" fill="url(#hologramGrad)" opacity="0.7"/>
    
    <!-- Neural connection indicators -->
    <path d="M -18 -35 Q -12 -45 -6 -40" stroke="url(#consciousnessCore)" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="0,20;10,10;20,0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 18 -35 Q 12 -45 6 -40" stroke="url(#consciousnessCore)" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="stroke-dasharray" values="20,0;10,10;0,20" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating holographic displays -->
  <g transform="translate(150, 200)" opacity="0.8">
    <rect x="0" y="0" width="100" height="80" rx="10" fill="url(#hologramGrad)" filter="url(#hologramEffect)" opacity="0.4"/>
    <text x="50" y="20" text-anchor="middle" fill="url(#consciousnessCore)" font-family="monospace" font-size="12">
      AI STATUS
    </text>
    <text x="10" y="35" fill="url(#hologramGrad)" font-family="monospace" font-size="8">
      Consciousness: ACTIVE
    </text>
    <text x="10" y="50" fill="url(#consciousnessCore)" font-family="monospace" font-size="8">
      Learning: ENABLED
    </text>
    <text x="10" y="65" fill="url(#hologramGrad)" font-family="monospace" font-size="8">
      Empathy: HIGH
    </text>
    
    <!-- Activity visualization -->
    <path d="M10 75 L20 65 L30 70 L40 60 L50 65 L60 55 L70 60 L80 50 L90 55" 
          stroke="url(#consciousnessCore)" stroke-width="2" fill="none">
      <animate attributeName="stroke-dasharray" values="0,100;50,50;100,0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <g transform="translate(550, 150)" opacity="0.7">
    <rect x="0" y="0" width="120" height="100" rx="12" fill="url(#hologramGrad)" filter="url(#hologramEffect)" opacity="0.3"/>
    <text x="60" y="20" text-anchor="middle" fill="url(#consciousnessCore)" font-family="monospace" font-size="12">
      ASSISTANT MODE
    </text>
    
    <!-- Task visualization -->
    <circle cx="30" cy="40" r="8" fill="none" stroke="url(#consciousnessCore)" stroke-width="2"/>
    <circle cx="30" cy="40" r="5" fill="url(#consciousnessCore)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <rect x="50" y="35" width="50" height="3" fill="url(#hologramGrad)"/>
    <rect x="50" y="42" width="40" height="2" fill="url(#consciousnessCore)" opacity="0.8"/>
    
    <text x="10" y="70" fill="url(#hologramGrad)" font-family="monospace" font-size="8">
      Ready to assist
    </text>
    <text x="10" y="85" fill="url(#consciousnessCore)" font-family="monospace" font-size="8">
      Language: Multi
    </text>
  </g>
  
  <!-- Environmental interaction beams -->
  <g opacity="0.4">
    <path d="M300 200 L250 150 L270 130 L320 180 Z" fill="url(#consciousnessCore)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M500 200 L550 150 L530 130 L480 180 Z" fill="url(#hologramGrad)">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Consciousness field particles -->
  <circle cx="200" cy="100" r="2" fill="url(#consciousnessCore)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;40,20;0,0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="120" r="1.5" fill="url(#hologramGrad)" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0,0;-30,25;0,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="400" r="1" fill="url(#consciousnessCore)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;25,-15;0,0" dur="10s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AI interaction field -->
  <circle cx="400" cy="300" r="120" fill="none" stroke="url(#consciousnessCore)" stroke-width="1" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" values="0 400 300;360 400 300" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="300" r="150" fill="none" stroke="url(#hologramGrad)" stroke-width="0.5" opacity="0.2">
    <animateTransform attributeName="transform" type="rotate" values="360 400 300;0 400 300" dur="25s" repeatCount="indefinite"/>
  </circle>
</svg> 